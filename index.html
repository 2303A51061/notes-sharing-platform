<!DOCTYPE html>
<html>

<head>
<title>Student Notes Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 Student Notes Hub</h1>
<p>Share and download study notes easily</p>
</header>

<div class="container">

<div class="upload-box">

<input id="title" placeholder="Note Title">
<input id="subject" placeholder="Subject">
<input type="file" id="file">

<button onclick="uploadNote()">Upload</button>

</div>

<div class="search-box">
<input id="search" placeholder="Search notes by subject..." onkeyup="searchNotes()">
</div>

<h2>Available Notes</h2>

<div id="notes" class="notes-container"></div>

</div>

<footer>
<p>Built for students 🚀</p>
</footer>

<script src="script.js"></script>

</body>
</html>
