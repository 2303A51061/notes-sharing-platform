<!DOCTYPE html>
<html>

<head>
<title>Notes Sharing Platform</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📚 Notes Sharing Platform</h1>

<div class="upload-box">

<input id="title" placeholder="Note Title">
<input id="subject" placeholder="Subject">
<input type="file" id="file">

<button onclick="uploadNote()">Upload Note</button>

</div>

<input id="search" placeholder="Search by subject..." onkeyup="searchNotes()">

<h2>Available Notes</h2>

<div id="notes" class="notes-container"></div>

</div>

<script src="script.js"></script>

</body>
</html>
